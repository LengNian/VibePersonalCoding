<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆博物馆 · Memory Museum 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e0ca8d;
    --warm-bg: #1a1512;
    --text: #e8e0d5;
    --text-dim: #a09888;
  }

  body {
    background: #0a0806;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'SimSun', serif;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
  }

  canvas { display: block; }

  /* ---- 自定义光标 ---- */
  .cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,245,220,0.2) 0%,
      rgba(255,240,210,0.08) 30%,
      rgba(255,230,190,0.02) 55%,
      transparent 100%
    );
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    transition: width 0.35s ease, height 0.35s ease;
  }
  .cursor.near {
    width: 240px; height: 240px;
    background: radial-gradient(circle,
      rgba(255,248,225,0.28) 0%,
      rgba(255,242,215,0.12) 30%,
      rgba(255,235,200,0.04) 55%,
      transparent 100%
    );
  }

  /* ---- HUD ---- */
  .hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }
  .scene-label {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(232,224,213,0.6);
    font-size: 13px;
    letter-spacing: 6px;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.8s;
  }
  .interact-hint {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--gold-light);
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.4s;
    text-shadow: 0 0 20px rgba(201,169,110,0.4);
  }
  .interact-hint.visible { opacity: 1; animation: hintPulse 2s ease-in-out infinite; }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .controls-help {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(160,152,136,0.5);
    font-size: 11px;
    letter-spacing: 2px;
  }

  /* ---- 过渡层 ---- */
  .transition-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #0a0806;
    opacity: 0;
    pointer-events: all;
    transition: opacity 0.8s ease;
  }
  .transition-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ---- 弹窗 ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(8,6,4,0.88);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    cursor: none;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .modal-card {
    background: linear-gradient(160deg, #1e1812 0%, #2a2218 40%, #1a1410 100%);
    border: 1px solid rgba(201,169,110,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 60px rgba(201,169,110,0.06);
    padding: 44px 40px 36px;
    max-width: 480px;
    width: 90%;
    max-height: 75vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.active .modal-card {
    transform: translateY(0) scale(1);
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--gold-light);
    font-size: 18px;
    width: 32px; height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    transition: all 0.3s;
    font-family: serif;
    border-radius: 2px;
  }
  .modal-close:hover {
    border-color: var(--gold-light);
    background: rgba(201,169,110,0.12);
    color: #fff;
  }
  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    color: var(--gold-light);
    letter-spacing: 3px;
    margin-bottom: 22px;
    text-align: center;
    font-weight: 600;
  }
  .modal-content {
    color: var(--text);
    font-size: 15px;
    line-height: 2;
    letter-spacing: 0.5px;
  }
  .modal-content p { margin-bottom: 14px; }

  .modal-card::-webkit-scrollbar { width: 3px; }
  .modal-card::-webkit-scrollbar-track { background: transparent; }
  .modal-card::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }

  .door-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px rgba(201,169,110,0.5);
    white-space: nowrap;
    pointer-events: none;
  }

  /* ---- 对话系统 ---- */
  .dialogue-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    background: linear-gradient(0deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    cursor: none;
    padding-bottom: 40px;
  }
  .dialogue-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .dialogue-box {
    width: 90%;
    max-width: 680px;
    background: linear-gradient(160deg, rgba(20,16,10,0.95) 0%, rgba(35,28,18,0.95) 100%);
    border: 1px solid rgba(201,169,110,0.35);
    border-radius: 4px;
    padding: 32px 36px 24px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.6), 0 0 30px rgba(201,169,110,0.05);
  }
  .dialogue-speaker {
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-family: 'Noto Serif SC', serif;
  }
  .dialogue-text {
    color: var(--text);
    font-size: 15px;
    line-height: 2;
    letter-spacing: 0.5px;
    min-height: 48px;
    transition: opacity 0.3s;
  }
  .dialogue-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(201,169,110,0.15);
  }
  .dialogue-option {
    background: rgba(201,169,110,0.06);
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--text);
    padding: 12px 18px;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: none;
    text-align: left;
    transition: all 0.3s;
    font-family: 'Noto Serif SC', serif;
    border-radius: 2px;
  }
  .dialogue-option:hover {
    background: rgba(201,169,110,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .dialogue-option.exit {
    border-style: dashed;
    opacity: 0.6;
    font-size: 13px;
    text-align: center;
  }

  /* ---- 天气指示器 ---- */
  .weather-indicator {
    position: absolute;
    bottom: 74px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    pointer-events: none;
    transition: all 0.5s;
  }

  /* ---- 响应式 ---- */
  @media (max-width: 768px) {
    .cursor { display: none; }
    .controls-help { bottom: 20px; font-size: 10px; }
    .modal-card { padding: 32px 24px 28px; }
    .dialogue-box { padding: 24px 20px 20px; }
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="cursor" id="cursor"></div>

  <div class="hud">
    <div class="scene-label" id="sceneLabel">记 忆 博 物 馆</div>
    <div class="interact-hint" id="interactHint">按 F 查看</div>
    <div class="controls-help">WASD 移动 | 空格跳跃 | 鼠标360°视角 | E 进门 | F 查看展品 | 1晴 2雨 3雪 4夜</div>
    <div class="weather-indicator" id="weatherIndicator">☀️</div>
  </div>

  <div class="transition-overlay" id="transitionOverlay"></div>

  <!-- 对话界面 -->
  <div class="dialogue-overlay" id="dialogueOverlay">
    <div class="dialogue-box" id="dialogueBox">
      <div class="dialogue-speaker" id="dialogueSpeaker"></div>
      <div class="dialogue-text" id="dialogueText"></div>
      <div class="dialogue-options" id="dialogueOptions"></div>
    </div>
  </div>

  <!-- 展品弹窗 -->
  <div class="modal-overlay" id="exhibitModal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">&times;</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- 点击开始提示（启用音频） -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1>记忆博物馆 · Memory Museum 3D</h1>
      <p>点击任意处开始</p>
      <p class="hint">Click anywhere to start</p>
    </div>
  </div>

  <style>
    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(10, 8, 6, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    .start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .start-content {
      text-align: center;
      color: var(--gold-light);
    }
    .start-content h1 {
      font-size: 32px;
      letter-spacing: 6px;
      margin-bottom: 30px;
      font-weight: 400;
    }
    .start-content p {
      font-size: 16px;
      letter-spacing: 4px;
      opacity: 0.8;
    }
    .start-content .hint {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 10px;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ============================================
  //  基础设置
  // ============================================
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0806);
  scene.fog = new THREE.Fog(0x0a0806, 18, 55);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.3, 80);
  camera.position.set(0, 3.5, 10);

  // ============================================
  //  材质工厂
  // ============================================
  function createCanvasTexture(w, h, drawFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    drawFn(ctx, w, h);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.magFilter = THREE.LinearFilter;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.generateMipmaps = true;
    if (MAX_ANISO > 1) tex.anisotropy = MAX_ANISO;
    return tex;
  }

  // 深色木地板纹理 (512px)
  const woodTex = createCanvasTexture(512, 512, (ctx, w, h) => {
    // 底色渐变 — 模拟不同木板颜色
    const grad = ctx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, '#4a3328');
    grad.addColorStop(0.33, '#523a2a');
    grad.addColorStop(0.66, '#483128');
    grad.addColorStop(1, '#4d3528');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    // 木纹年轮 — 更细密
    for (let i = 0; i < 200; i++) {
      const y = Math.random() * h;
      const alpha = 0.01 + Math.random() * 0.04;
      const shade = 20 + Math.random() * 25;
      ctx.strokeStyle = `rgba(${shade},${shade-8},${shade-12},${alpha})`;
      ctx.lineWidth = 0.3 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x < w; x += 12) {
        ctx.lineTo(x, y + Math.sin(x * 0.02) * (0.5 + Math.random() * 2.5));
      }
      ctx.stroke();
    }
    // 木板接缝 (深色沟槽)
    for (let x = 0; x < w; x += 64) {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x - 1.5, 0, 3, h);
      // 接缝旁的高光
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(x - 3, 0, 2, h);
    }
    // 细微磨损/划痕
    for (let i = 0; i < 100; i++) {
      ctx.strokeStyle = `rgba(0,0,0,${0.02 + Math.random() * 0.04})`;
      ctx.lineWidth = 0.3;
      const sx = 4 + Math.random() * (w - 8);
      const sy = Math.random() * h;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (Math.random() - 0.5) * 30, sy + (Math.random() - 0.5) * 4);
      ctx.stroke();
    }
  });
  woodTex.repeat.set(4, 4);

  // 米白墙壁 — 护墙板 + 石膏纹理 (512px)
  const wallTex = createCanvasTexture(512, 512, (ctx, w, h) => {
    // 底色
    ctx.fillStyle = '#cbc0af';
    ctx.fillRect(0, 0, w, h);

    // 下部护墙板 (wainscoting, 占 40%)
    const wainscotTop = h * 0.62;
    ctx.fillStyle = '#c2b7a4';
    ctx.fillRect(0, wainscotTop, w, h - wainscotTop);
    // 护墙板竖线
    for (let x = 20; x < w; x += 32) {
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(x - 1, wainscotTop, 3, h - wainscotTop);
    }
    // 护墙板横线
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, wainscotTop + (h - wainscotTop) * 0.5, w, 2);
    // 腰线 / dado rail
    ctx.fillStyle = '#b8ac98';
    ctx.fillRect(0, wainscotTop - 3, w, 6);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, wainscotTop - 3, w, 2);

    // 上部墙壁纹理 — 石膏颗粒感 (更细密)
    for (let i = 0; i < 800; i++) {
      const shade = 0.01 + Math.random() * 0.04;
      const r = 180 + Math.random() * 40;
      ctx.fillStyle = `rgba(${r},${r-15},${r-30},${shade})`;
      const sx = Math.random() * w;
      const sy = Math.random() * wainscotTop;
      ctx.fillRect(sx, sy, 1 + Math.random() * 3, 1 + Math.random() * 2);
    }

    // 水平纹理线 (轻微)
    for (let y = 4; y < wainscotTop; y += 16) {
      ctx.strokeStyle = `rgba(0,0,0,${0.01 + Math.random() * 0.015})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, y + Math.random() * 4);
      for (let x = 0; x < w; x += 8) {
        ctx.lineTo(x, y + Math.sin(x * 0.1) * 2);
      }
      ctx.stroke();
    }
  });
  wallTex.repeat.set(1, 0.5);

  // 深色门 (256x512)
  const doorTex = createCanvasTexture(256, 512, (ctx, w, h) => {
    // 底色 + 渐变
    const dGrad = ctx.createLinearGradient(0, 0, w, 0);
    dGrad.addColorStop(0, '#3d2518');
    dGrad.addColorStop(0.5, '#452a1a');
    dGrad.addColorStop(1, '#3a2216');
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, 0, w, h);
    // 木纹 — 更多更细
    for (let i = 0; i < 120; i++) {
      ctx.strokeStyle = `rgba(15,8,3,${0.06 + Math.random() * 0.12})`;
      ctx.lineWidth = 0.5 + Math.random() * 2.5;
      ctx.beginPath();
      ctx.moveTo(0, Math.random() * h);
      for (let y = 0; y < h; y += 8) {
        ctx.lineTo(Math.random() * w, y);
      }
      ctx.stroke();
    }
    // 竖条面板分割
    for (let x = 20; x < w; x += 30) {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(x - 1, 0, 2, h);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(x - 3, 0, 1, h);
    }
    // 表面磨损
    for (let i = 0; i < 50; i++) {
      ctx.fillStyle = `rgba(0,0,0,${0.02 + Math.random() * 0.05})`;
      ctx.fillRect(Math.random() * w, Math.random() * h, 2 + Math.random() * 6, 1 + Math.random() * 2);
    }
  });

  // ============================================
  //  光照 (全局)
  // ============================================
  const ambientLight = new THREE.AmbientLight(0x4a3a2a, 1.0);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
  dirLight.position.set(5, 10, 0);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -5;
  dirLight.shadow.bias = -0.0005;
  dirLight.shadow.normalBias = 0.02;
  scene.add(dirLight);

  // 填充光
  const fillLight = new THREE.DirectionalLight(0xd4c4b0, 0.45);
  fillLight.position.set(-3, 3, 2);
  scene.add(fillLight);

  // ============================================
  //  纹理
  // ============================================
  const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.75, metalness: 0.02, color: '#4a3528' });
  const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.85, metalness: 0.01, color: '#cbc0af' });
  const doorMat = new THREE.MeshStandardMaterial({ map: doorTex, roughness: 0.7, metalness: 0.05, color: '#4a2510' });
  const frameMat = new THREE.MeshStandardMaterial({ color: '#3d2010', roughness: 0.65, metalness: 0.05 });
  const goldMat = new THREE.MeshStandardMaterial({ color: '#c9a96e', roughness: 0.35, metalness: 0.7 });
  const darkMetalMat = new THREE.MeshStandardMaterial({ color: '#2a2a2a', roughness: 0.4, metalness: 0.8 });

  // ============================================
  //  场景对象管理
  // ============================================
  const scenes = {
    corridor: { group: new THREE.Group(), colliders: [], interactables: [], name: '记 忆 博 物 馆' },
    past: { group: new THREE.Group(), colliders: [], interactables: [], name: '过 去 之 室' },
    present: { group: new THREE.Group(), colliders: [], interactables: [], name: '现 在 之 室' },
    future: { group: new THREE.Group(), colliders: [], interactables: [], name: '未 来 之 室' },
    curator: { group: new THREE.Group(), colliders: [], interactables: [], name: '馆 长 办 公 室' },
  };

  let currentScene = 'corridor';
  let activeSceneData = scenes[currentScene];
  scene.add(scenes.corridor.group);

  // 增/删碰撞器
  function addCollider(group, x, z, w, d, tag = '') {
    scenes[group].colliders.push({ x, z, w, d, tag });
  }
  function addInteractable(group, mesh, data) {
    scenes[group].interactables.push({ mesh, data, group });
  }

  // ============================================
  //  工具函数
  // ============================================
  function box(w, h, d, mat) {
    const g = new THREE.BoxGeometry(w, h, d);
    const m = new THREE.Mesh(g, mat);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  }
  function add(group, mesh) {
    scenes[group].group.add(mesh);
    return mesh;
  }

  function wall(group, x, z, w, h, d, mat) {
    const m = box(w, h, d, mat);
    m.position.set(x, h / 2, z);
    add(group, m);
    addCollider(group, x, z, w, d);
    return m;
  }
  function floor(group, x, z, w, d, mat) {
    const m = box(w, 0.2, d, mat);
    m.position.set(x, -0.1, z);
    m.receiveShadow = true;
    add(group, m);
    return m;
  }

  // ============================================
  //  走廊构建
  // ============================================
  const CORRIDOR_LENGTH = 14;

      if (px > col.x - halfW && px < col.x + halfW &&

        // 检查是否是门碰撞器
        if (col.tag && ['past','present','future','curator'].includes(col.tag)) {
          return { block: true, door: col.tag };
        }
        return { block: true };
      }
    }
    return { block: false };
  }

    let minD = Infinity;
    let doorTag = '';
    for (const col of activeSceneData.colliders) {
      if (col.tag && ['past','present','future','curator'].includes(col.tag)) {
        const dx = player.position.x - col.x;
        const dz = player.position.z - col.z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d < minD) { minD = d; doorTag = col.tag; }
      }
    }
    return { distance: minD, tag: doorTag };
  }

    osc.frequency.value = freq;
    env.gain.setValueAtTime(0.2, starAudioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001, starAudioCtx.currentTime + duration * 1.3);
    osc.connect(env);env.connect(starGain);
    osc.start(starAudioCtx.currentTime);osc.stop(starAudioCtx.currentTime + duration * 1.4);
    // 低八度和声 (更丰富)
    const osc2 = starAudioCtx.createOscillator();
    const env2 = starAudioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq / 2;
    env2.gain.setValueAtTime(0.08, starAudioCtx.currentTime);
    env2.gain.exponentialRampToValueAtTime(0.0001, starAudioCtx.currentTime + duration * 1.5);
    osc2.connect(env2);env2.connect(starGain);
    osc2.start(starAudioCtx.currentTime);osc2.stop(starAudioCtx.currentTime + duration * 1.6);
    starNoteIdx++;
    starNoteTimeout = setTimeout(() => playNextStarNote(), duration * 800);
  }

  // ============================================
  //  追梦赤子心 (中学房间)
  // ============================================
  let dreamMusicOn = false;
  let dreamNoteIdx = 0;
  let dreamNoteTimeout = null;
  // 追梦赤子心 副歌旋律 (C大调)
  const dreamMelody = [
    392,330,294,262,  220,262,294,330,  392,330,294,262,  294,330,392,  392,330,294,262,  220,262,294,330,  392,330,294,262,  294,330,294,
    392,440,523,  523,440,392,330,  294,330,392,  392,440,523,  523,440,392,330,  294,262,294,262
  ];
  const dreamDurations = [
    0.4,0.4,0.4,0.5,  0.3,0.3,0.3,0.5,  0.4,0.4,0.4,0.5,  0.4,0.4,0.8,  0.4,0.4,0.4,0.5,  0.3,0.3,0.3,0.5,  0.4,0.4,0.4,0.5,  0.4,0.4,0.8,
    0.3,0.3,0.6,  0.3,0.3,0.3,0.3,  0.4,0.4,0.8,  0.3,0.3,0.6,  0.3,0.3,0.3,0.3,  0.4,0.4,0.5,0.5
  ];

  function startDreamMusic() {
    if (dreamMusicOn) return;
    if (!starAudioCtx) {
      starAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      starGain = starAudioCtx.createGain();
      starGain.gain.value = starVolume;
      starGain.connect(starAudioCtx.destination);
    }
    if (starAudioCtx.state === 'suspended') starAudioCtx.resume();
    dreamMusicOn = true;
    dreamNoteIdx = 0;
    playNextDreamNote();
  }

  function stopDreamMusic() {
    dreamMusicOn = false;
    if (dreamNoteTimeout) { clearTimeout(dreamNoteTimeout); dreamNoteTimeout = null; }
  }

  function playNextDreamNote() {
    if (!dreamMusicOn || !starAudioCtx) return;
    const freq = dreamMelody[dreamNoteIdx % dreamMelody.length];
    const duration = dreamDurations[dreamNoteIdx % dreamDurations.length];
    // 主旋律
    const osc = starAudioCtx.createOscillator();
    const env = starAudioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0.25, starAudioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001, starAudioCtx.currentTime + duration * 1.2);
    osc.connect(env);env.connect(starGain);
    osc.start(starAudioCtx.currentTime);osc.stop(starAudioCtx.currentTime + duration * 1.3);
    // 低八度
    const osc2 = starAudioCtx.createOscillator();
    const env2 = starAudioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq / 2;
    env2.gain.setValueAtTime(0.08, starAudioCtx.currentTime);
    env2.gain.exponentialRampToValueAtTime(0.0001, starAudioCtx.currentTime + duration * 1.4);
    osc2.connect(env2);env2.connect(starGain);
    osc2.start(starAudioCtx.currentTime);osc2.stop(starAudioCtx.currentTime + duration * 1.5);
    dreamNoteIdx++;
    dreamNoteTimeout = setTimeout(() => playNextDreamNote(), duration * 700);
  }

  function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.1);

    if (!isTransitioning) {
      // 鼠标旋转轨道相机
      if (Math.abs(mouseDX) > 0.01 || Math.abs(mouseDY) > 0.01) {
        cameraAngle -= mouseDX * 0.002;
        cameraPitch += mouseDY * 0.002;
        cameraPitch = Math.max(CAMERA_PITCH_MIN, Math.min(CAMERA_PITCH_MAX, cameraPitch));
        mouseDX = 0;
        mouseDY = 0;
      }

      // 相机前方方向 (从摄像机看向角色 = 画面深处, WASD 以此为参照)
      const camForward = new THREE.Vector3(-Math.sin(cameraAngle), 0, -Math.cos(cameraAngle));
      const camRight = new THREE.Vector3(Math.cos(cameraAngle), 0, -Math.sin(cameraAngle));

      // WASD 移动 (相对相机方向)
      const moveDir = new THREE.Vector3();
      if (keys['w'] || keys['arrowup']) moveDir.add(camForward);
      if (keys['s'] || keys['arrowdown']) moveDir.sub(camForward);
      if (keys['a'] || keys['arrowleft']) moveDir.sub(camRight);
      if (keys['d'] || keys['arrowright']) moveDir.add(camRight);

      const isMoving = moveDir.length() > 0.01;
      player.isMoving = isMoving;
      if (isMoving) {
        moveDir.normalize();
        player.moveAngle = Math.atan2(moveDir.x, moveDir.z);
        const newX = player.position.x + moveDir.x * player.speed * dt;
        const newZ = player.position.z + moveDir.z * player.speed * dt;

        const collision = checkCollision(newX, newZ);
        if (!collision.block) {
          player.position.x = newX;
          player.position.z = newZ;
        } else if (collision.door) {
          const colX = checkCollision(newX, player.position.z);
          const colZ = checkCollision(player.position.x, newZ);
          if (!colX.block) player.position.x = newX;
          if (!colZ.block && !colZ.door) player.position.z = newZ;
        }
      }

      // 跳跃与重力
      if (!player.isOnGround) {
        player.velocityY += GRAVITY * dt;
        player.position.y += player.velocityY * dt;
        if (player.position.y <= GROUND_Y) {
          player.position.y = GROUND_Y;
          player.velocityY = 0;
          player.isOnGround = true;
        }
      }

      // 更新角色模型 (朝向移动方向, 或朝向相机)
      character.position.copy(player.position);
      character.rotation.y = player.moveAngle;

      if (isMoving && player.isOnGround) {
        character.position.y = player.position.y + Math.sin(Date.now() * 0.015) * 0.04;
      }
    }

    // 轨道相机：球坐标 → 笛卡尔坐标
    const camX = player.position.x + Math.sin(cameraAngle) * cameraDistance * Math.cos(cameraPitch);
    const camY = player.position.y + cameraDistance * Math.sin(cameraPitch);
    const camZ = player.position.z + Math.cos(cameraAngle) * cameraDistance * Math.cos(cameraPitch);
    const camTarget = new THREE.Vector3(camX, camY, camZ);

    // 相机注视角色头顶
    const lookTarget = new THREE.Vector3(
      player.position.x,
      player.position.y + 1.2,
      player.position.z
    );

    camera.position.lerp(camTarget, 0.1);
    camera.lookAt(lookTarget);

    // 更新门标牌
    updateDoorSigns();

    // 提示系统
    const hintEl = document.getElementById('interactHint');
    if (currentScene === 'corridor') {
      const { distance: doorDist } = getDoorDistance();
      const nearestIA = getNearestInteractable();
      if (doorDist < 1.5) {
        hintEl.textContent = '按 E 进入';
        hintEl.classList.add('visible');
      } else if (nearestIA) {
        hintEl.textContent = '按 F 查看';
        hintEl.classList.add('visible');
      } else {
        hintEl.classList.remove('visible');
      }
    } else {
      // 房间内：同时检测对话和展品
      let hasDialogue = false, hasExhibit = false;
      for (const ia of activeSceneData.interactables) {
        const d = player.position.distanceTo(ia.mesh.position);
        if (d < 7.0) {
          if (ia.data.type === 'dialogue') hasDialogue = true;
          else hasExhibit = true;
        }
      }
      if (hasDialogue && hasExhibit) {
        hintEl.textContent = '按 E 交流 · 按 F 查看';
      } else if (hasDialogue) {
        hintEl.textContent = '按 E 交流';
      } else if (hasExhibit) {
        hintEl.textContent = '按 F 查看';
      } else {
        hintEl.textContent = '';
      }
      hintEl.classList.toggle('visible', hasDialogue || hasExhibit);
    }

    // 过去房间: 旋转木马 + 秋千 + 小鱼/蝌蚪/喷泉
    if (currentScene === 'past') {
      const PX=-5,PZ=4,PR=3.5;
      activeSceneData.group.traverse(child => {
        if (child.userData && child.userData.carousel) {
          child.rotation.y += dt * 0.3;
          child.children.forEach(sub => {
            if (sub.userData && sub.userData.carouselHorse) {
              sub.position.y = 0.82 + Math.sin(Date.now()*0.003 + sub.position.x*3) * 0.06;
            }
          });
        }
        if (child.userData && child.userData.swing) {
          child.rotation.z = Math.sin(Date.now() * 0.002) * 0.12;
        }
        if (child.userData && child.userData.fountain) {
          child.position.y = child.userData.fBaseY + Math.sin(Date.now()*0.005 + child.position.x*3) * 0.2;
          child.material.opacity = 0.3 + Math.sin(Date.now()*0.004) * 0.2;
        }
        if (child.userData && child.userData.fish) {
          const t = Date.now() * 0.001 + child.userData.fishPhase;
          child.position.x += Math.cos(t * 0.8) * dt * 0.4;
          child.position.z += Math.sin(t * 0.8) * dt * 0.4;
          child.rotation.y = Math.atan2(Math.cos(t*0.8),Math.sin(t*0.8));
          if (child.position.x < PX-PR || child.position.x > PX+PR) child.position.x = Math.max(PX-PR, Math.min(PX+PR, child.position.x));
          if (child.position.z < PZ-PR || child.position.z > PZ+PR) child.position.z = Math.max(PZ-PR, Math.min(PZ+PR, child.position.z));
        }
        if (child.userData && child.userData.tadpole) {
          const t2 = Date.now() * 0.002 + child.userData.tPhase;
          child.position.x += Math.cos(t2) * dt * 0.15;
          child.position.z += Math.sin(t2) * dt * 0.15;
          child.rotation.y = Math.atan2(Math.cos(t2),Math.sin(t2));
          child.scale.z = 1 + Math.sin(t2*3) * 0.2;
          if (child.position.x < PX-PR || child.position.x > PX+PR) child.position.x = Math.max(PX-PR, Math.min(PX+PR, child.position.x));
          if (child.position.z < PZ-PR || child.position.z > PZ+PR) child.position.z = Math.max(PZ-PR, Math.min(PZ+PR, child.position.z));
        }
      });
    }

    // 馆长办公室: 咖啡热气动画
    if (currentScene === 'curator') {
      activeSceneData.group.traverse(child => {
        if (child.userData && child.userData.steam) {
          child.position.y = child.userData.baseY + Math.sin(Date.now() * 0.004 + child.position.x * 5) * 0.12;
          child.material.opacity = 0.15 + Math.sin(Date.now() * 0.005 + child.position.x * 3) * 0.15;
        }
      });
    }

    // 未来房间: 星图旋转 + 植物摇摆
    if (currentScene === 'future') {
      activeSceneData.group.traverse(child => {
        if (child.userData && child.userData.starGlobe) {
          child.rotation.y += dt * 0.3;
          child.rotation.x += dt * 0.15;
        }
        if (child.userData && child.userData.plant) {
          child.rotation.z = Math.sin(Date.now() * 0.002 + child.position.x) * 0.1;
        }
      });
    }

    // 返回提示
    const helpEl = document.querySelector('.controls-help');
    if (currentScene !== 'corridor') {
      helpEl.textContent = 'WASD 移动 | 空格跳跃 | 鼠标360°视角 | F 交互 | ESC 返回';
    } else {
      helpEl.textContent = 'WASD 移动 | 空格跳跃 | 鼠标360°视角 | E 进门 | F 查看展品';
    }

    // ===== 房间音乐自动切换 =====
    if (currentScene === 'present' && player.position.z < 7) {
      if (currentSong !== 'star') startStarSong();
    } else if (currentScene === 'present' && player.position.z >= 7 && player.position.z < 17) {
      if (currentSong !== 'dream') startDreamSong();
    } else if (currentScene === 'present' && player.position.z >= 17) {
      if (currentSong !== 'milk') startMilkSong();
    } else if (currentScene === 'corridor' || currentScene === 'curator') {
      if (currentSong !== 'kanong') startKanongSong();
    } else if (currentScene === 'past') {
      if (currentSong !== 'past') startPastSong();
    } else if (currentScene === 'future') {
      if (currentSong !== 'future') startFutureSong();
    } else {
      if (roomMusicOn) stopRoomMusic();
    }

    // ===== 天气自动循环 + 过渡 (仅过去之屋) =====
    weatherGroup.visible = (currentScene === 'past');
    document.getElementById('weatherIndicator').style.display = (currentScene === 'past') ? '' : 'none';
    if (currentScene === 'past') {
      weatherTimer += dt;
      const cyclePos = weatherTimer % WEATHER_CYCLE_TIME;
      const inTransition = cyclePos < WEATHER_TRANSITION;
      const nextIdx = (weatherIdx + 1) % weatherCycle.length;

      if (weatherTimer >= WEATHER_CYCLE_TIME) {
        weatherTimer = 0;
        weather = weatherCycle[nextIdx];
        weatherIdx = nextIdx;
        buildWeather(weather);
        weatherParticles.forEach(p => { p.userData.savedOpacity = p.material.opacity; });
      }

      const transitionAlpha = inTransition ? cyclePos / WEATHER_TRANSITION : 1;
      weatherParticles.forEach(p => {
        if (p.userData.savedOpacity === undefined) p.userData.savedOpacity = p.material.opacity;
        if (inTransition) { p.material.opacity = p.userData.savedOpacity * transitionAlpha; }
        else { p.material.opacity = p.userData.savedOpacity; }
        if (p.userData.weather === 'rain') {
          p.position.y -= p.userData.speed * dt;
          if (p.position.y < -1) { p.position.y = 10 + Math.random()*8; p.position.x = (Math.random()-0.5)*40; p.position.z = (Math.random()-0.5)*40; }
        }
        if (p.userData.weather === 'snow') {
          p.position.y -= p.userData.speed * dt;
          p.position.x += Math.sin(Date.now()*0.001 + p.position.z) * p.userData.drift * dt;
          if (p.position.y < -1) { p.position.y = 12 + Math.random()*6; p.position.x = (Math.random()-0.5)*40; p.position.z = (Math.random()-0.5)*40; }
        }
        if (p.userData.weather === 'star') {
          p.material.opacity = (p.userData.savedOpacity||0.5) * (0.6+Math.sin(Date.now()*0.003+p.userData.twinkle)*0.4) * transitionAlpha;
        }
      });

      const nextWeatherW = weatherCycle[nextIdx];
      const curBg = new THREE.Color(weatherBgMap[weather] || '#0a0806');
      const nxtBg = new THREE.Color(weatherBgMap[nextWeatherW] || '#0a0806');
      const bgT = inTransition ? cyclePos / WEATHER_TRANSITION : 0;
      if (scene.background instanceof THREE.Color) scene.background.copy(curBg.clone().lerp(nxtBg, bgT));
      const curFog = weatherFogMap[weather] || {c:0x0a0806,n:18,f:55};
      const nxtFog = weatherFogMap[nextWeatherW] || {c:0x0a0806,n:18,f:55};
      scene.fog = new THREE.Fog(new THREE.Color(curFog.c).lerp(new THREE.Color(nxtFog.c),bgT), curFog.n+(nxtFog.n-curFog.n)*bgT, curFog.f+(nxtFog.f-curFog.f)*bgT);
    } else {
      // 非过去之屋：恢复默认背景
      scene.background = new THREE.Color('#1a1512');
      scene.fog = new THREE.Fog(0x1a1512, 18, 55);
    }

    // 自定义光标
    const hintVisible = hintEl.classList.contains('visible');
    document.getElementById('cursor').classList.toggle('near', hintVisible);

    renderer.render(scene, camera);
  }

  // ============================================
  //  自定义光标
  // ============================================
  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
  });

  // ============================================
  //  窗口大小
  // ============================================
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  // ============================================
  //  启动
  // ============================================
  let audioStarted = false;
  const startOverlay = document.getElementById('startOverlay');

  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    startKanongSong();
    startOverlay.classList.add('hidden');
    setTimeout(() => { startOverlay.style.display = 'none'; }, 800);
  }

  startOverlay.addEventListener('click', startAudio);
  startOverlay.addEventListener('touchstart', startAudio);

  document.getElementById('sceneLabel').textContent = scenes.corridor.name;

  animate();

  console.log('🏛️ 记忆博物馆已就绪');
  console.log('  WASD — 移动 | 移动鼠标 — 360° 旋转视角 | 滚轮 — 缩放');
  console.log('  走廊中靠近门按 E — 进入房间');
  console.log('  房间中靠近展品按 F — 查看');
  console.log('  ESC — 返回走廊');
  </script>
</body>
</html>
